# Ona automations for the Ghostfolio demo environment.
#
# Boot order (all services start simultaneously; ready gates enforce ordering):
#   1. postgres-redis: docker compose up, ready when pg_isready + redis PONG
#   2. api: waits for postgres in start cmd, pushes schema, seeds, then serves
#   3. client: Angular dev server on 0.0.0.0:4200 (no SSL)
#
# After all services are ready the seed-demo task inserts the demo portfolio.

services:
  postgres-redis:
    name: PostgreSQL + Redis
    description: Backing stores via docker compose.
    triggeredBy:
      - postDevcontainerStart
      - postEnvironmentStart
    commands:
      start: docker compose -f docker/docker-compose.dev.yml up
      ready: |
        docker exec gf-postgres-dev pg_isready -U user -d ghostfolio-db && \
        docker exec gf-redis-dev redis-cli --pass "$(grep ^REDIS_PASSWORD .env | cut -d= -f2)" ping | grep -q PONG
      stop: docker compose -f docker/docker-compose.dev.yml down

  api:
    name: Ghostfolio API
    description: NestJS backend, hot-reload, port 3333.
    triggeredBy:
      - postDevcontainerStart
      - postEnvironmentStart
    commands:
      start: |
        # Gate on Postgres (services can't use dependsOn).
        until docker exec gf-postgres-dev pg_isready -U user -d ghostfolio-db >/dev/null 2>&1; do sleep 1; done
        # Push schema + run Prisma seed (tags) on first boot.
        if [ ! -f .ona/.db-initialized ]; then
          npm run database:setup
          touch .ona/.db-initialized
        fi
        npm run start:server
      ready: curl -sf http://localhost:3333/api/v1/health

  client:
    name: Ghostfolio Client
    description: Angular frontend, hot-reload, port 4200.
    triggeredBy:
      - postDevcontainerStart
      - postEnvironmentStart
    commands:
      start: npm run start:client
      ready: curl -sf http://localhost:4200/en

tasks:
  seed-demo:
    name: Seed demo portfolio
    description: Insert demo user + portfolio data after the API has pushed the schema.
    dependsOn:
      - api
    triggeredBy:
      - postDevcontainerStart
      - postEnvironmentStart
    command: bash .devcontainer/seed-demo-data.sh

  seed:
    name: Reset + seed demo data
    description: Wipe the DB and reseed from scratch.
    triggeredBy:
      - manual
    command: |
      rm -f .ona/.db-initialized
      docker compose -f docker/docker-compose.dev.yml down -v
      docker compose -f docker/docker-compose.dev.yml up -d
      until docker exec gf-postgres-dev pg_isready -U user -d ghostfolio-db >/dev/null 2>&1; do sleep 1; done
      npm run database:setup
      touch .ona/.db-initialized
      bash .devcontainer/seed-demo-data.sh
      echo "DB reset + demo data seeded."

  dry-run-demo:
    name: 'Dry-run: local agent beat'
    description: Sanity check that the API is reachable and tests pass.
    triggeredBy:
      - manual
    command: |
      set -e
      curl -sf http://localhost:3333/api/v1/health | jq .
      echo "API healthy. Local agent beat ready."
